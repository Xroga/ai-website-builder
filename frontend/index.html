<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant | Xroga</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .glass-card {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border-radius: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    }
    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .message-user {
      background: linear-gradient(135deg, #6e8efb, #a777e3);
      color: white;
      border-radius: 1rem 1rem 0.25rem 1rem;
    }
    .message-bot {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      border-radius: 1rem 1rem 1rem 0.25rem;
    }
    .typing-indicator span {
      background-color: white;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.4s infinite ease-in-out both;
      margin: 0 2px;
    }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    .chat-container::-webkit-scrollbar {
      width: 6px;
    }
    .chat-container::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }
    .chat-container::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
    }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
  <div class="glass-card w-full max-w-3xl h-[80vh] flex flex-col overflow-hidden">
    <div class="p-4 border-b border-white/20 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i data-lucide="bot" class="w-8 h-8 text-white"></i>
        <h1 class="text-2xl font-bold text-white">Xroga AI Assistant</h1>
      </div>
      <button onclick="clearChat()" class="text-white/70 hover:text-white transition">
        <i data-lucide="trash-2" class="w-5 h-5"></i>
      </button>
    </div>

    <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-4 chat-container">
      <div class="flex justify-start">
        <div class="message-bot max-w-[80%] p-3">
          <p>👋 Hello! I'm your AI assistant. Ask me anything—I'm here to help!</p>
        </div>
      </div>
    </div>

    <div class="p-4 border-t border-white/20">
      <div class="flex gap-3">
        <input type="text" id="userInput" placeholder="Type your question..." 
               class="flex-1 p-3 rounded-xl bg-white/10 text-white placeholder-white/50 border border-white/30 focus:outline-none focus:ring-2 focus:ring-white/50">
        <button onclick="sendMessage()" id="sendButton" class="btn-gradient px-5 py-2 rounded-xl flex items-center gap-2">
          <i data-lucide="send" class="w-5 h-5"></i>
          <span class="hidden sm:inline">Send</span>
        </button>
      </div>
      <p class="text-xs text-white/50 mt-2 text-center">Powered by Gemini AI</p>
    </div>
  </div>

  <script>
    lucide.createIcons();

    // Update this URL to your actual worker URL if it changes
    const API_BASE = "https://ai-website-builder.evanderthorne-help.workers.dev";
    let isWaiting = false;

    function addMessage(content, isUser) {
      const messagesDiv = document.getElementById('chatMessages');
      const messageDiv = document.createElement('div');
      messageDiv.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
      messageDiv.innerHTML = `
        <div class="${isUser ? 'message-user' : 'message-bot'} max-w-[80%] p-3">
          <p class="whitespace-pre-wrap">${escapeHtml(content)}</p>
        </div>
      `;
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showTyping() {
      const messagesDiv = document.getElementById('chatMessages');
      const typingDiv = document.createElement('div');
      typingDiv.id = 'typingIndicator';
      typingDiv.className = 'flex justify-start';
      typingDiv.innerHTML = `
        <div class="message-bot max-w-[80%] p-3 flex items-center gap-1">
          <div class="typing-indicator flex">
            <span></span><span></span><span></span>
          </div>
          <span class="text-sm ml-1">AI is thinking...</span>
        </div>
      `;
      messagesDiv.appendChild(typingDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function hideTyping() {
      const typing = document.getElementById('typingIndicator');
      if (typing) typing.remove();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const message = input.value.trim();
      if (!message || isWaiting) return;

      addMessage(message, true);
      input.value = '';
      input.focus();

      showTyping();
      isWaiting = true;

      try {
        const response = await fetch(`${API_BASE}/ask`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        const data = await response.json();
        hideTyping();
        if (data.success) {
          addMessage(data.reply, false);
        } else {
          addMessage(`Error: ${data.error}`, false);
        }
      } catch (err) {
        hideTyping();
        addMessage(`Network error: ${err.message}`, false);
      } finally {
        isWaiting = false;
      }
    }

    function clearChat() {
      const messagesDiv = document.getElementById('chatMessages');
      messagesDiv.innerHTML = `
        <div class="flex justify-start">
          <div class="message-bot max-w-[80%] p-3">
            <p>👋 Hello! I'm your AI assistant. Ask me anything—I'm here to help!</p>
          </div>
        </div>
      `;
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
